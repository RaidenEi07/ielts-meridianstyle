spring.application.name=meridian-backend

# Cho phep bo trong field primitive (int/boolean) -> nhan gia tri mac dinh
spring.jackson.deserialization.fail-on-null-for-primitives=false

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/meridian}
spring.datasource.username=${DB_USER:meridian}
spring.datasource.password=${DB_PASSWORD:meridian}

# schema is owned by Flyway, never by Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

server.port=${SERVER_PORT:8090}
server.error.include-message=always
server.error.include-binding-errors=always

# --- Application-specific configuration ---
# 256-bit secret (base64 hoac plain). Override qua bien moi truong khi production.
meridian.jwt.secret=${JWT_SECRET:change-me-in-production-this-is-a-dev-only-secret-key-0123456789}
meridian.jwt.access-token-ttl-seconds=${JWT_ACCESS_TTL:900}
meridian.jwt.refresh-token-ttl-seconds=${JWT_REFRESH_TTL:1209600}
meridian.jwt.issuer=meridian
meridian.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3100}
meridian.uploads.dir=${UPLOADS_DIR:uploads}
meridian.uploads.public-base-url=${UPLOADS_PUBLIC_BASE_URL:http://localhost:8090}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

logging.level.org.flywaydb=info
logging.level.com.meridian=debug
